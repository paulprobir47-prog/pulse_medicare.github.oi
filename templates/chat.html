<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse Medicare - Chat</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/sidebar.css') }}">
  <style>
    :root {
      --bg: #f3f5f7;
      --surface: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #0ea5a4;
      --primary-ink: #064e4a;
      --border: rgba(15,23,42,0.12);
      --chat-sender: #ecfdf5;
      --chat-receiver: #eff6ff;
      --chat-sender-border: rgba(13,148,136,0.25);
      --chat-receiver-border: rgba(59,130,246,0.20);
      --chat-meta: rgba(15,23,42,0.65);
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Arial, sans-serif;
    }
    .main {
      margin-left: 78px;
      padding: 22px;
      width: calc(100% - 78px);
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(2, 6, 23, 0.08);
      overflow: hidden;
    }

    /* Robust “page size” handling */
    .chat-layout {
      height: calc(100vh - 70px);
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 560px;
    }
    .sidebar-panel {
      border-right: 1px solid var(--border);
      background: #fff;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .panel-header {
      padding: 16px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex: 0 0 auto;
    }
    .panel-header h2 {
      font-size: 16px;
      margin: 0;
      letter-spacing: 0.2px;
      color: var(--primary-ink);
    }
    .users-search {
      padding: 12px 16px;
    }
    .users-search input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      outline: none;
    }
    .user-list {
      max-height: calc(100vh - 170px);
      overflow: auto;
    }
    .user-item {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid rgba(15,23,42,0.06);
      user-select: none;
    }
    .user-item:hover {
      background: rgba(0,150,136,0.06);
    }
    .user-item.active {
      background: rgba(0,150,136,0.12);
      border-left: 4px solid var(--primary);
      padding-left: 12px;
    }
    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(0,150,136,0.15);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      font-weight: 800;
      flex: 0 0 auto;
    }
    .user-meta {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .user-name {
      font-weight: 800;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .user-role {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-panel {
      display: flex;
      flex-direction: column;
      background: #fff;
    }
    .chat-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .chat-header .title {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }
    .chat-header h3 {
      margin: 0;
      font-size: 16px;
    }
    .chat-header .sub {
      margin: 0;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .messages {
      flex: 1 1 auto;
      padding: 18px;
      overflow: auto;
      background: #fbfdff;
      display: flex;
      flex-direction: column;
      gap: 10px;
      /* Fix chat page sizing/scroll height */
      min-height: 0;
    }

    .msg {
      max-width: 72%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(15,23,42,0.06);
      box-shadow: 0 1px 4px rgba(0,0,0,0.03);
    }

    .msg.sender {
      margin-left: auto;
      background: var(--chat-sender);
      border-color: var(--chat-sender-border);
    }
    .msg.receiver {
      margin-right: auto;
      background: var(--chat-receiver);
      border-color: var(--chat-receiver-border);
    }
    .msg .meta {
      font-size: 11px;
      color: rgba(15,23,42,0.65);
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
    }
    .msg .text {
      font-size: 14px;
      line-height: 1.35;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .composer {
      border-top: 1px solid var(--border);
      padding: 14px;
      display: flex;
      gap: 10px;
      align-items: center;
      background: #fff;
    }
    .composer textarea {
      flex: 1;
      min-height: 44px;
      max-height: 120px;
      resize: vertical;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      outline: none;
      line-height: 1.3;
    }
    .composer button {
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid rgba(0,150,136,0.25);
      background: var(--primary);
      color: #fff;
      font-weight: 900;
      cursor: pointer;
    }
    .composer button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    @media (max-width: 980px) {
      .main { margin-left: 0; width: 100%; }
      .chat-layout { grid-template-columns: 1fr; }
      .sidebar-panel { border-right: none; border-bottom: 1px solid var(--border); }
      .messages { max-height: 55vh; }
    }
  </style>
</head>
<body>
  {% include '_sidebar.html' %}
  <div class="main">
    <div class="card chat-layout">
      <div class="sidebar-panel">
        <div class="panel-header">
          <h2><i class="fa fa-users"></i> Users</h2>
          <button type="button" class="btn" style="display:none"></button>
        </div>
        <div class="users-search">
          <input id="userSearch" type="text" placeholder="Search users..." />
        </div>
        <div class="user-list" id="userList">
          {% for u in users %}
            <div class="user-item {% if u.username == active_peer_username %}active{% endif %}" data-peer="{{ u.username }}">
              <span class="avatar">{{ u.full_name[:1]|upper if u.full_name else u.username[:1]|upper }}</span>
              <div class="user-meta">
                <div class="user-name">{{ u.full_name or u.username }}</div>
                <div class="user-role">{{ u.role }}</div>
              </div>
            </div>
          {% endfor %}
        </div>
      </div>

      <div class="chat-panel">
        <div class="chat-header">
          <div class="title">
            <h3 id="peerName">{{ active_peer_name }}</h3>
            <p class="sub" id="peerMeta">{{ active_peer_username }}</p>
          </div>
          <div>
            <a class="btn" href="/dashboard" style="text-decoration:none">Back</a>
          </div>
        </div>

        <div class="messages" id="messages"></div>

        <div class="composer">
          <textarea id="messageBox" placeholder="Type a message..."></textarea>
          <button id="sendBtn" type="button" disabled>
            <i class="fa fa-paper-plane"></i> Send
          </button>
        </div>
      </div>
    </div>
  </div>

<script>
(function() {
  const currentUser = {{ current_username|tojson }};
  let peerUsername = {{ active_peer_username|tojson }};

  const messagesEl = document.getElementById('messages');
  const messageBox = document.getElementById('messageBox');
  const sendBtn = document.getElementById('sendBtn');
  const userList = document.getElementById('userList');
  const userSearch = document.getElementById('userSearch');

  const peerNameEl = document.getElementById('peerName');
  const peerMetaEl = document.getElementById('peerMeta');


  function escapeHtml(s) {
    return String(s)
      .replaceAll('&','&amp;')
      .replaceAll('<','<')
      .replaceAll('>','>')
      .replaceAll('"','"')
      .replaceAll("'",'&#039;');
  }

  function renderMessage(msg) {
    const isSender = msg.from_username === currentUser;
    const cls = isSender ? 'sender' : 'receiver';

    // meta rebuilt properly (avoid template-string HTML mistakes)

    const metaWrap = document.createElement('div');
    metaWrap.className = 'meta';
    const left = document.createElement('span');
    left.textContent = msg.from_username;
    const right = document.createElement('span');
    right.textContent = msg.sent_at;
    metaWrap.appendChild(left);
    metaWrap.appendChild(right);

    const text = document.createElement('div');
    text.className = 'text';
    text.textContent = msg.message;

    const bubble = document.createElement('div');
    bubble.className = `msg ${cls}`;
    bubble.appendChild(metaWrap);
    bubble.appendChild(text);

    messagesEl.appendChild(bubble);
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function loadMessages() {
    if (!peerUsername) return;
    sendBtn.disabled = true;

    messagesEl.innerHTML = '';
    const res = await fetch(`/chat/messages?peer=${encodeURIComponent(peerUsername)}`, { headers: {'Accept':'application/json'} });
    if (!res.ok) return;
    const data = await res.json();
    (data.messages || []).forEach(renderMessage);
    scrollToBottom();

    // enable send after load
    sendBtn.disabled = !messageBox.value.trim();
  }

  async function sendMessage() {
    const text = messageBox.value.trim();
    if (!text || !peerUsername) return;

    sendBtn.disabled = true;
    const res = await fetch('/chat/send', {
      method: 'POST',
      headers: {'Content-Type':'application/json', 'Accept':'application/json'},
      body: JSON.stringify({ peer_username: peerUsername, message: text })
    });

    if (res.ok) {
      messageBox.value = '';
      await loadMessages();
      messageBox.focus();
    } else {
      sendBtn.disabled = false;
    }
  }

  function setActivePeer(nextPeer) {
    peerUsername = nextPeer;
    const item = userList.querySelector(`.user-item[data-peer="${CSS.escape(nextPeer)}"]`);
    userList.querySelectorAll('.user-item.active').forEach(el => el.classList.remove('active'));
    if (item) item.classList.add('active');

    peerMetaEl.textContent = nextPeer;
    peerNameEl.textContent = item ? (item.querySelector('.user-name').textContent) : nextPeer;

    loadMessages();
  }

  document.querySelectorAll('.user-item').forEach(el => {
    el.addEventListener('click', () => {
      const nextPeer = el.getAttribute('data-peer');
      setActivePeer(nextPeer);
    });
  });

  if (userSearch) {
    userSearch.addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase().trim();
      document.querySelectorAll('.user-item').forEach(el => {
        const name = el.querySelector('.user-name')?.textContent.toLowerCase() || '';
        const role = el.querySelector('.user-role')?.textContent.toLowerCase() || '';
        el.style.display = (!term || name.includes(term) || role.includes(term)) ? '' : 'none';
      });
    });
  }

  messageBox.addEventListener('input', () => {
    sendBtn.disabled = !messageBox.value.trim();
  });

  sendBtn.addEventListener('click', sendMessage);

  messageBox.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Initial load
  loadMessages();

})();
</script>
</body>
</html>
