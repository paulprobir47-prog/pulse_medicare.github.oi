<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Edit User</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root {
      --bg:#f2f7fb;
      --surface:#ffffff;
      --text:#102a43;
      --muted:#627d98;
      --primary:#0f766e;
      --primary-dark:#115e59;
      --border:#dbeafe;
      --shadow:0 18px 42px rgba(2,6,23,0.08);
    }
    body{font-family:Segoe UI,Arial;background:var(--bg);color:var(--text);margin:0;padding:24px}
    .card{max-width:760px;margin:24px auto;background:var(--surface);padding:28px;border-radius:18px;box-shadow:var(--shadow);border:1px solid var(--border)}
    .card h2{margin:0 0 18px;font-size:24px;color:var(--primary)}
    label{display:block;margin:10px 0 6px;font-weight:700;color:var(--text)}
    input,select{width:100%;padding:11px 12px;border-radius:10px;border:1px solid var(--border);background:#f8fbfd;color:var(--text);font:inherit}
    input:focus,select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(15,118,110,0.12)}
    .actions{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
    .btn{padding:10px 16px;border-radius:10px;border:none;cursor:pointer;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
    .btn-primary{background:var(--primary);color:white}
    .btn-primary:hover{background:var(--primary-dark)}
    .btn-muted{background:#e2e8f0;color:#334155}
  </style>
<link rel="stylesheet" href="{{ url_for('static', filename='css/sidebar.css') }}">
</head>
<body>
{% include '_sidebar.html' %}
  <div class="card">
    <h2>Edit User: {{ user.username }}</h2>
    <form method="post" action="">
      <label>Full Name</label>
      <input name="full_name" value="{{ user.full_name or '' }}">
      <label>Email</label>
      <input name="email" value="{{ user.email or '' }}">
      <label>Phone</label>
      <input name="phone" value="{{ user.phone or '' }}">
      <label>Role</label>
      <select name="role">
        {% for r in roles %}
        <option value="{{ r.role_name }}" {% if user.role==r.role_name %}selected{% endif %}>{{ r.role_name }}</option>
        {% endfor %}
      </select>
      <div class="actions">
        <button class="btn btn-primary" type="submit">Save</button>
        <a class="btn btn-muted" href="/admin/users">Cancel</a>
      </div>
    </form>
  </div>
<script src="{{ url_for('static', filename='js/sidebar.js') }}"></script>
</body>
</html>
